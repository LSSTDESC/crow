version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  commands:
    - pip install -r docs/requirements.txt
    - pip install numpy
    - make -C docs html
    - mkdir -p $READTHEDOCS_OUTPUT/html
    - cp -r docs/_build/html/* $READTHEDOCS_OUTPUT/html/

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - requirements: docs/requirements.txt
